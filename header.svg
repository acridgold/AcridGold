<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020b18"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#030d1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF9C"/>
      <stop offset="50%" style="stop-color:#00CFFF"/>
      <stop offset="100%" style="stop-color:#00FF9C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .star { animation: twinkle var(--dur) ease-in-out infinite; }
      @keyframes twinkle {
        0%, 100% { opacity: 1; r: var(--r); }
        50%       { opacity: 0.1; r: calc(var(--r) * 0.4); }
      }
      .textglow {
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { filter: url(#glow); opacity: 1; }
        50%       { filter: url(#glow); opacity: 0.85; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <!-- Stars layer 1 — small dim, slow -->
  <circle class="star" style="--dur:4.1s;--r:1px" cx="45"  cy="18"  r="1"   fill="#ffffff" opacity="0.6" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:5.3s;--r:1px" cx="120" cy="34"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:3.7s;--r:1px" cx="200" cy="12"  r="1"   fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--dur:6.2s;--r:1px" cx="310" cy="28"  r="1"   fill="#aaddff" opacity="0.5"/>
  <circle class="star" style="--dur:4.8s;--r:1px" cx="420" cy="8"   r="1"   fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--dur:5.5s;--r:1px" cx="530" cy="22"  r="1"   fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--dur:3.9s;--r:1px" cx="640" cy="15"  r="1"   fill="#aaddff" opacity="0.6"/>
  <circle class="star" style="--dur:7.1s;--r:1px" cx="750" cy="30"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:4.4s;--r:1px" cx="840" cy="10"  r="1"   fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--dur:5.0s;--r:1px" cx="880" cy="45"  r="1"   fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--dur:6.6s;--r:1px" cx="70"  cy="60"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:4.2s;--r:1px" cx="160" cy="75"  r="1"   fill="#aaddff" opacity="0.4"/>
  <circle class="star" style="--dur:3.5s;--r:1px" cx="260" cy="55"  r="1"   fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--dur:5.8s;--r:1px" cx="370" cy="65"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:4.6s;--r:1px" cx="480" cy="50"  r="1"   fill="#ffffff" opacity="0.7"/>
  <circle class="star" style="--dur:7.3s;--r:1px" cx="590" cy="70"  r="1"   fill="#aaddff" opacity="0.4"/>
  <circle class="star" style="--dur:3.8s;--r:1px" cx="700" cy="58"  r="1"   fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--dur:5.1s;--r:1px" cx="800" cy="72"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:4.3s;--r:1px" cx="30"  cy="140" r="1"   fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--dur:6.0s;--r:1px" cx="140" cy="155" r="1"   fill="#aaddff" opacity="0.5"/>
  <circle class="star" style="--dur:3.6s;--r:1px" cx="240" cy="145" r="1"   fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--dur:5.4s;--r:1px" cx="680" cy="150" r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:4.7s;--r:1px" cx="780" cy="140" r="1"   fill="#aaddff" opacity="0.4"/>
  <circle class="star" style="--dur:6.8s;--r:1px" cx="870" cy="160" r="1"   fill="#ffffff" opacity="0.6"/>
  <circle class="star" style="--dur:3.3s;--r:1px" cx="60"  cy="180" r="1"   fill="#ffffff" opacity="0.5"/>
  <circle class="star" style="--dur:5.6s;--r:1px" cx="170" cy="190" r="1"   fill="#ffffff" opacity="0.4"/>
  <circle class="star" style="--dur:4.9s;--r:1px" cx="820" cy="185" r="1"   fill="#aaddff" opacity="0.5"/>

  <!-- Stars layer 2 — medium bright, fast -->
  <circle class="star" style="--dur:2.8s;--r:1.5px" cx="90"  cy="25"  r="1.5" fill="#ffffff" opacity="0.9" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:2.3s;--r:1.5px" cx="280" cy="40"  r="1.5" fill="#aaddff" opacity="0.8" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:3.1s;--r:1.5px" cx="460" cy="30"  r="1.5" fill="#ffffff" opacity="0.9" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:2.6s;--r:1.5px" cx="620" cy="20"  r="1.5" fill="#aaddff" opacity="0.8" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:3.4s;--r:1.5px" cx="810" cy="35"  r="1.5" fill="#ffffff" opacity="0.9" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:2.1s;--r:1.5px" cx="180" cy="160" r="1.5" fill="#ffffff" opacity="0.8" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:2.9s;--r:1.5px" cx="720" cy="170" r="1.5" fill="#aaddff" opacity="0.9" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:3.2s;--r:1.5px" cx="860" cy="80"  r="1.5" fill="#ffffff" opacity="0.8" filter="url(#starGlow)"/>

  <!-- Stars layer 3 — large bright, slowest -->
  <circle class="star" style="--dur:5.5s;--r:2px" cx="20"  cy="50"  r="2" fill="#ffffff" opacity="1" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:6.5s;--r:2px" cx="350" cy="15"  r="2" fill="#aaddff" opacity="1" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:4.5s;--r:2px" cx="570" cy="45"  r="2" fill="#ffffff" opacity="1" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:7.0s;--r:2px" cx="760" cy="20"  r="2" fill="#aaddff" opacity="1" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:5.0s;--r:2px" cx="110" cy="170" r="2" fill="#ffffff" opacity="1" filter="url(#starGlow)"/>
  <circle class="star" style="--dur:6.0s;--r:2px" cx="790" cy="175" r="2" fill="#aaddff" opacity="1" filter="url(#starGlow)"/>

  <!-- Corner accents -->
  <rect x="6" y="6" width="18" height="2.5" fill="#00FF9C" opacity="0.7"/>
  <rect x="6" y="6" width="2.5" height="18" fill="#00FF9C" opacity="0.7"/>
  <rect x="876" y="6" width="18" height="2.5" fill="#00FF9C" opacity="0.7"/>
  <rect x="891.5" y="6" width="2.5" height="18" fill="#00FF9C" opacity="0.7"/>
  <rect x="6" y="191.5" width="18" height="2.5" fill="#00FF9C" opacity="0.7"/>
  <rect x="6" y="176" width="2.5" height="18" fill="#00FF9C" opacity="0.7"/>
  <rect x="876" y="191.5" width="18" height="2.5" fill="#00FF9C" opacity="0.7"/>
  <rect x="891.5" y="176" width="2.5" height="18" fill="#00FF9C" opacity="0.7"/>

  <!-- LEV text -->
  <text class="textglow" x="450" y="112"
    font-family="'Courier New', monospace"
    font-size="82" font-weight="bold"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="18">LEV</text>

  <!-- Subtitle -->
  <text x="450" y="148"
    font-family="'Courier New', monospace"
    font-size="13" fill="#aaaaaa"
    text-anchor="middle"
    opacity="0.7"
    letter-spacing="7">BACKEND  ·  QA  ·  NSU</text>
</svg>
